{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="{% static 'styles/layout.css' %}">
     <link rel="stylesheet" href="{% static 'styles/text.css' %}">
    <link rel="stylesheet" href="{% static 'styles/form_style.css' %}" media="all">
    <link rel="stylesheet" href="{% static 'styles/custom_flatpickr_styles.css' %}">

    <title> {% block title %} Title {% endblock %}</title>

    <link rel="icon" type="image/ico" sizes="32x32" href="/static/images/now_chart.ico">

</head>
<body>
    <div class="main-container">
        <nav class="navigation"> {% block navigation %} {% endblock %}  </nav>

        <div class="content-data">
            {% block content-data %}
            <div class="chart-data"> {% block chart-data %} {% endblock %}</div>
            {% endblock %}
        </div>


        <footer>
            {% block footer-data %}
                 <img src="">
            {% endblock %}

        </footer>
    </div>

</body>
</html>
