
services:
  astro-service:
    build: .
    command: ["sh", "/astro_app/start.sh"]
    volumes:
      - .:/astro_app
      - ./staticfiles:/var/www/staticfiles
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    expose:
      - "8000"
    environment:
      PYTHONUNBUFFERED: 1
      DJANGO_SETTINGS_MODULE: astroknow.settings
      DJANGO_DEBUG: False
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M


  nginx:
    image: my-custom-nginx-image:latest
    build:
        context: .
        dockerfile: Dockerfile.nginx
    ports:
      - "8080:81"
    volumes:
          - ./staticfiles:/var/www/staticfiles:ro
          - static_volume:/var/www/static
          - media_volume:/var/www/media
    depends_on:
      - astro-service

volumes:
  static_volume:
  media_volume:


